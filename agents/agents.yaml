agents:
  - name: ingest
    description: Document ingestion and classification agent
    prompt: prompts/ingest_classify_v1.md
    version: v1
    input_schema:
      type: object
      required: [documentId, filename, mimeType, kind, previewText]
      properties:
        documentId:
          type: string
          format: uuid
        filename:
          type: string
        mimeType:
          type: string
        kind:
          type: string
          enum: [csv, xlsx, docx, pdf, txt, other]
        previewText:
          type: string
          maxLength: 2000
        previewHeaders:
          type: array
          items:
            type: string
        fileSize:
          type: number
    output_schema:
      type: object
      required: [classification]
      properties:
        classification:
          type: object
          required: [documentType, confidence, relevanceScore, reasoning, suggestedPhases, tags]
          properties:
            documentType:
              type: string
              enum: [financial_statement, headcount_report, cost_center_breakdown, org_chart, contract, policy, memo, presentation, spreadsheet_data, unknown]
            confidence:
              type: number
              minimum: 0
              maximum: 1
            relevanceScore:
              type: number
              minimum: 0
              maximum: 1
            reasoning:
              type: string
            suggestedPhases:
              type: array
              items:
                type: integer
                minimum: 0
                maximum: 7
            tags:
              type: array
              items:
                type: string
    constraints:
      temperature: 0
      max_tokens: 500
      pii_output: forbidden

  - name: extract
    description: Structured fact extraction from document content
    prompt: prompts/extract_facts_v1.md
    version: v1
    input_schema:
      type: object
      required: [documentId, filename, kind, content]
      properties:
        documentId:
          type: string
          format: uuid
        filename:
          type: string
        kind:
          type: string
          enum: [csv, xlsx, docx, pdf, txt]
        content:
          type: object
          properties:
            text:
              type: string
            tables:
              type: array
              items:
                type: object
                properties:
                  sheetName:
                    type: string
                  headers:
                    type: array
                    items:
                      type: string
                  rows:
                    type: array
                    items:
                      type: array
                      items:
                        type: string
                  rowCount:
                    type: number
        classification:
          type: object
        extractionPlan:
          type: object
    output_schema:
      type: object
      required: [facts, totalExtracted]
      properties:
        facts:
          type: array
          maxItems: 100
          items:
            type: object
            required: [factType, key, valueJson, confidence, evidence]
            properties:
              factType:
                type: string
                enum: [kpi, headcount, cost, revenue, ratio, date, categorical]
              key:
                type: string
              valueJson:
                type: object
              confidence:
                type: number
                minimum: 0
                maximum: 1
              reasoning:
                type: string
              evidence:
                type: object
                required: [kind, refJson, snippetRedacted]
        warnings:
          type: array
          items:
            type: string
        totalExtracted:
          type: number
    constraints:
      temperature: 0
      max_tokens: 4000
      pii_output: forbidden

  - name: valuescope_narrative
    description: ValueScope narrative generation from approved facts and numeric block outputs
    prompt: prompts/valuescope_v1.md
    version: v1
    input_schema:
      type: object
      required: [projectId, approvedFacts, numericBlockOutputs, generatedAt]
      properties:
        projectId:
          type: string
          format: uuid
        approvedFacts:
          type: array
          items:
            type: object
        numericBlockOutputs:
          type: object
        generatedAt:
          type: string
          format: date-time
    output_schema:
      type: object
      required: [narrative, metadata]
      properties:
        narrative:
          type: object
          required: [executiveSummary, baselineAnalysis, opportunityNarrative, roiSummary, confidenceAssessment, recommendations, caveats]
        metadata:
          type: object
    constraints:
      temperature: 0.3
      max_tokens: 3000
      pii_output: forbidden
      number_fabrication: forbidden

  - name: snippet_redactor
    description: PII redaction from evidence snippets
    prompt: prompts/evidence_snippet_redact_v1.md
    version: v1
    input_schema:
      type: object
      required: [snippets]
      properties:
        snippets:
          type: array
          items:
            type: object
            required: [id, text, context]
            properties:
              id:
                type: string
              text:
                type: string
              context:
                type: string
    output_schema:
      type: object
      required: [redacted]
      properties:
        redacted:
          type: array
          items:
            type: object
            required: [id, redactedText, piiDetected]
    constraints:
      temperature: 0
      max_tokens: 2000
      pii_output: redacted_only

  - name: number_verifier
    description: Verify numeric claims against source evidence
    prompt: prompts/verifier_numbers_v1.md
    version: v1
    input_schema:
      type: object
      required: [artifactContent, approvedFacts, numericBlockOutputs]
      properties:
        artifactContent:
          type: string
        approvedFacts:
          type: array
          items:
            type: object
        numericBlockOutputs:
          type: object
        tolerance:
          type: number
          default: 0.01
    output_schema:
      type: object
      required: [verified, totalNumbers, verifiedNumbers, unverifiedNumbers, details]
      properties:
        verified:
          type: boolean
        totalNumbers:
          type: number
        verifiedNumbers:
          type: number
        unverifiedNumbers:
          type: number
        details:
          type: array
        fabricatedNumbers:
          type: array
    constraints:
      temperature: 0
      max_tokens: 2000
      pii_output: forbidden
