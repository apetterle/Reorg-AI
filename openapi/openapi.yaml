openapi: 3.0.3
info:
  title: ReOrg AI API
  description: REST API for the ReOrg AI corporate restructuring analysis platform.
  version: 1.0.0
  contact:
    name: ReOrg AI Team

servers:
  - url: /api
    description: API base path

paths:
  /register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, fullName]
              properties:
                username:
                  type: string
                password:
                  type: string
                fullName:
                  type: string
      responses:
        "200":
          description: User created and logged in

  /login:
    post:
      summary: Authenticate user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Authenticated

  /logout:
    post:
      summary: End session
      tags: [Auth]
      responses:
        "200":
          description: Logged out

  /user:
    get:
      summary: Get current user
      tags: [Auth]
      responses:
        "200":
          description: Current user info

  /tenants:
    get:
      summary: List user's tenants
      tags: [Tenants]
      responses:
        "200":
          description: List of tenants

  /tenants/{tenantId}/projects:
    get:
      summary: List projects in tenant
      tags: [Projects]
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of projects
    post:
      summary: Create project
      tags: [Projects]
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Project created

  /projects/{projectId}/documents:
    get:
      summary: List project documents
      tags: [Documents]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of documents
    post:
      summary: Upload document
      tags: [Documents]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Document uploaded

  /projects/{projectId}/facts:
    get:
      summary: List project facts
      tags: [Facts]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [proposed, approved, rejected]
      responses:
        "200":
          description: List of facts

  /facts/{factId}:
    patch:
      summary: Update fact status
      tags: [Facts]
      parameters:
        - name: factId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [proposed, approved, rejected]
      responses:
        "200":
          description: Fact updated

  /projects/{projectId}/artifacts:
    get:
      summary: List project artifacts
      tags: [Artifacts]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of artifacts

  /projects/{projectId}/jobs:
    get:
      summary: List project jobs
      tags: [Jobs]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of jobs
    post:
      summary: Create a job
      tags: [Jobs]
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                inputJson:
                  type: object
      responses:
        "201":
          description: Job created (queued)

  /jobs/{jobId}:
    get:
      summary: Get job status
      tags: [Jobs]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job details with step progress

  /invites:
    post:
      summary: Create workspace invite
      tags: [Invites]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenantId, email, role]
              properties:
                tenantId:
                  type: string
                  format: uuid
                email:
                  type: string
                role:
                  type: string

  /invites/accept:
    post:
      summary: Accept invite by token
      tags: [Invites]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string

components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum: [UNAUTHORIZED, FORBIDDEN, NOT_FOUND, VALIDATION, CONFLICT, RATE_LIMIT, INTERNAL, NOT_READY, PII_BLOCKED]
            message:
              type: string
            requestId:
              type: string
            details:
              type: object
